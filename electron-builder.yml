appId: dev.tradent
productName: Tradent
copyright: Copyright © 2025 Tradent Contributors

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*

extraMetadata:
  main: out/main/index.js

# Icon files (add to resources/ directory):
#   macOS:  resources/icon.icns
#   Windows: resources/icon.ico
#   Linux:  resources/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  darkModeSupport: true
  target:
    - target: dmg
      arch: [x64, arm64]

win:
  target:
    - target: nsis
      arch: [x64]

linux:
  category: Finance
  target:
    - target: AppImage
      arch: [x64]
